version: '3.8'

services:
  backend:
    build: ./backend
    container_name: node-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
