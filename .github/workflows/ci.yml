name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: 📦 Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: 🔨 Build Frontend
        run: |
          cd frontend
          npm run build

      - name: 🐳 Build Backend Docker Image
        run: docker build -t student-result-backend ./backend

      - name: 🐳 Build Frontend Docker Image
        run: docker build -t student-result-frontend ./frontend

      - name: ✅ Pipeline Success
        run: echo "🎉 Pipeline completed successfully!"
